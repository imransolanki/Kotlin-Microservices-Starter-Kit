openapi: 3.0.3
info:
  title: Pet Store API
  version: 1.0.0
  description: A simple pet store microservice

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service is unhealthy

  /pet/:
    post:
      summary: Create a pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "201":
          description: Pet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: Update a pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "200":
          description: Pet updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: Validation error
        "404":
          description: Pet not found

  /pet/{petId}:
    get:
      summary: Get a pet by ID
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Pet found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: Invalid petId
        "404":
          description: Pet not found

  /pet/{petName}:
    delete:
      summary: Delete pets by name
      parameters:
        - name: petName
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Number of pets deleted
        "404":
          description: Pet not found

components:
  schemas:
    Pet:
      type: object
      required: [name, photo_url, status]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          minLength: 2
          maxLength: 50
        photo_url:
          type: string
          maxLength: 2048
        status:
          type: string
          enum: [available, sold]

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [UP, DOWN]
